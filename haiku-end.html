<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <link rel="stylesheet" href="styles.css">

</head>
<body id="haiku-end">

    <div id="floating-poems-root" class="floating-poems-root" aria-hidden="true"></div>

    <main class="end-container">
        <h1 class="page-titles" id="end-title">Only humans do pointless things.</h1>

        <!--HAIKU RESTART BUTTON-->
        <a href="index.html">
            <img src="img/restart-button.png" alt="Restart the haiku process" width="200px">
        </a>
    </main>

    <script>
        (function () {
            const STORAGE_KEY = 'haikuSubmissions';
            const MAX_VISIBLE = 7;
            const ROTATE_MS = 22000;

            function loadPoems() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (!raw) return [];
                    const data = JSON.parse(raw);
                    if (!Array.isArray(data)) return [];
                    return data
                        .map((item) => (typeof item === 'string' ? { text: item } : item))
                        .filter((item) => item && typeof item.text === 'string' && item.text.trim());
                } catch {
                    return [];
                }
            }

            function shuffle(arr) {
                const a = arr.slice();
                for (let i = a.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [a[i], a[j]] = [a[j], a[i]];
                }
                return a;
            }

            function pickVisible(poems) {
                if (poems.length <= MAX_VISIBLE) return poems.map((p) => p.text.trim());
                return shuffle(poems)
                    .slice(0, MAX_VISIBLE)
                    .map((p) => p.text.trim());
            }

            function renderFloating(root, texts) {
                root.innerHTML = '';
                const placed = [];

                function approximateRadiusPercent(text) {
                    const len = (text || '').trim().length;
                    // Radius estimate so we can prevent initial overlaps.
                    // Typical 3-line haikus will land around ~7-12.
                    const scale = Math.min(len, 90) / 90;
                    return 7 + scale * 5;
                }

                texts.forEach((text) => {
                    const el = document.createElement('div');
                    el.className = 'floating-poem';
                    el.textContent = text;

                    // Place poems outside a "bubble" around the center of the screen.
                    // Center is (50, 50) in percent coordinates; bubble radius ~18%.
                    const centerX = 50;
                    const centerY = 50;
                    const bubbleRadius = 18;

                    const radius = approximateRadiusPercent(text);
                    let left = 8;
                    let top = 10;

                    for (let attempt = 0; attempt < 70; attempt++) {
                        // Keep away from edges a bit so text doesn't get clipped.
                        left = 8 + Math.random() * 84;  // 8-92%
                        top = 6 + Math.random() * 88;   // 6-94%

                        // Keep outside the center bubble (expanded by our poem size estimate).
                        const dx = left - centerX;
                        const dy = top - centerY;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < (bubbleRadius + radius * 0.25)) continue;

                        // Prevent overlap with previously placed poems.
                        let overlaps = false;
                        for (const p of placed) {
                            const ddx = left - p.left;
                            const ddy = top - p.top;
                            const d = Math.sqrt(ddx * ddx + ddy * ddy);
                            if (d < (radius + p.radius + 2.5)) {
                                overlaps = true;
                                break;
                            }
                        }
                        if (overlaps) continue;

                        break;
                    }

                    el.style.left = left + '%';
                    el.style.top = top + '%';

                    const duration = 16 + Math.random() * 14;
                    const delay = -Math.random() * duration;
                    el.style.animationDuration = duration + 's';
                    el.style.animationDelay = delay + 's';

                    el.style.opacity = '1';

                    placed.push({ left, top, radius });
                    root.appendChild(el);
                });
            }

            const root = document.getElementById('floating-poems-root');
            let pool = loadPoems();

            function tick() {
                pool = loadPoems();
                const texts = pickVisible(pool);
                renderFloating(root, texts);
            }

            tick();
            if (pool.length > MAX_VISIBLE) {
                setInterval(tick, ROTATE_MS);
            }
        })();
    </script>
</body>
</html>
